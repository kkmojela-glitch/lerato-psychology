        .logo { font-size: 1.5rem; font-weight: 700; color: var(--text-dark); text-decoration: none; }
        .nav-links { display: flex; list-style: none; gap: 35px; }
        
        /* Mobile Responsive Overrides */
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .hero-container, .about-content, .contact-container, .services-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 2.2rem; }
            .container { width: 92%; }
        }
