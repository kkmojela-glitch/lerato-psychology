<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lerato Psychology</title>
    <style>
        /* Base styles */
        body { font-family: 'Montserrat', sans-serif; color: #222; margin: 0; padding: 0; }
        .container { width: 85%; max-width: 1200px; margin: 0 auto; }
        
        /* Mobile Responsiveness Overhaul */
        @media (max-width: 768px) {
            .container { width: 92%; padding: 0 4%; }
            .nav-container { flex-direction: column; gap: 12px; text-align: center; }
            .nav-links { gap: 15px; flex-wrap: wrap; justify-content: center; margin-bottom: 8px; }
            .btn-book { width: 100%; justify-content: center; }
            .hero { padding: 30px 0 60px 0; }
            .hero-container { grid-template-columns: 1fr; gap: 30px; text-align: center; }
            .hero h1 { font-size: 2.1rem; }
            .hero p { margin: 0 auto 24px auto; }
            .hero-buttons { flex-direction: column; gap: 12px; }
            .btn-hero-primary, .btn-hero-secondary { width: 100%; justify-content: center; }
            .hero-image-wrapper img { height: 300px; }
            .floating-badges { grid-template-columns: 1fr; gap: 12px; margin-top: -30px; padding: 16px; }
            .badge-item { border-right: none; border-bottom: 1px solid rgba(6, 47, 38, 0.08); padding-bottom: 10px; padding-right: 0; }
            .badge-item:last-child { border-bottom: none; padding-bottom: 0; }
            .section-header h2 { font-size: 1.7rem; }
            .grid-cards { grid-template-columns: 1fr; gap: 20px; }
            .card-img-holder img { height: 180px; }
            .split-layout { grid-template-columns: 1fr; gap: 40px; }
            .profile-side { flex-direction: column; text-align: center; }
            .profile-pic img { width: 100%; max-width: 280px; height: 320px; margin: 0 auto; }
            .footer-container { flex-direction: column; gap: 15px; text-align: center; }
            .footer-socials { margin-top: 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Lerato Psychology</h1>
        <!-- Your original website content goes here -->
    </div>
</body>
</html>
